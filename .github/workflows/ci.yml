name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Install uv
        # setup-uv stopped publishing major tags in v8 — pin the full version
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.14"

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Install frontend dependencies
        run: cd web && bun install --frozen-lockfile

      - name: Run formatting, lint, typecheck, and tests
        run: just ci

  # Browser smoke test in a separate job so the fast `check` job above stays lean
  # and unchanged. Mirrors its just/uv/bun setup, plus a Playwright browser install.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Install uv
        # setup-uv stopped publishing major tags in v8 — pin the full version
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.14"

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Install frontend dependencies
        run: cd web && bun install --frozen-lockfile

      - name: Install Playwright browser
        run: cd web && bunx playwright install --with-deps chromium

      - name: Run end-to-end smoke test
        run: just e2e
