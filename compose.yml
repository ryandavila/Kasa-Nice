services:
  kasa-nice:
    build: .
    # Default (bridge) networking works everywhere, including Docker Desktop on
    # macOS/Windows. Note: broadcast discovery (UDP) does NOT cross the bridge —
    # use the Discovery tab to add devices by IP if auto-discovery finds nothing.
    ports:
      - "8080:8080"
    # On a Linux host, replace the `ports:` block above with host networking so
    # UDP broadcast discovery can reach devices on your LAN:
    #   network_mode: host
    # TP-Link cloud credentials for newer SMART-protocol devices (e.g. KP125M)
    # come from an untracked .env file, injected at runtime — never baked into
    # the image. See .env.example. Legacy plugs work without them.
    env_file:
      - path: .env
        required: false
    environment:
      - PYTHONUNBUFFERED=1
      - KASA_HOST=0.0.0.0
      - KASA_PORT=8080
    volumes:
      - ./logs:/app/logs
      # Persists known device hosts so manually-added (by-IP) devices survive
      # restarts and rebuilds.
      - ./data:/app/data
    restart: unless-stopped
    # Probe the API with stdlib Python (the slim image has no curl/wget). Reads
    # KASA_PORT so it tracks the configured port. The app serves immediately —
    # discovery runs in the background — so a short start period is enough.
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os,urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:'+os.environ.get('KASA_PORT','8080')+'/api/health',timeout=3).status==200 else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
